<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Education Portal — Register</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a202c;
    }
    .logo p {
      font-size: 13px;
      color: #718096;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a202c;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4299e1; }
    input.error { border-color: #e53e3e; }

    .field { margin-bottom: 18px; }

    .hint {
      font-size: 11px;
      color: #a0aec0;
      margin-top: 4px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    button:hover:not(:disabled) { background: #3182ce; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    .alert {
      display: none;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .alert.success {
      background: #f0fff4;
      border: 1.5px solid #68d391;
      color: #276749;
    }
    .alert.failure {
      background: #fff5f5;
      border: 1.5px solid #fc8181;
      color: #c53030;
    }

    .success-box {
      display: none;
      text-align: center;
      padding: 20px 0 4px;
    }
    .success-box .check { font-size: 48px; }
    .success-box h2 { font-size: 18px; font-weight: 700; color: #276749; margin-top: 10px; }
    .success-box p  { font-size: 13px; color: #4a5568; margin-top: 6px; line-height: 1.6; }
    .token-box {
      background: #edf2f7;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      font-family: monospace;
      color: #4a5568;
      word-break: break-all;
      margin-top: 14px;
      text-align: left;
    }
    .token-box strong { display: block; margin-bottom: 4px; color: #2d3748; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>Education Portal</h1>
    <p>Create your student account</p>
  </div>

  <!-- Alert banner -->
  <div id="alert" class="alert"></div>

  <!-- Registration form -->
  <form id="registerForm" novalidate>

    <div class="field">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="e.g. John Smith" autocomplete="name">
      <div class="hint">Minimum 2 characters</div>
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
      <div class="hint">Minimum 6 characters</div>
    </div>

    <div class="field">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password">
    </div>

    <button type="submit" id="submitBtn">Create Account</button>
  </form>

  <!-- Success view (shown after registration) -->
  <div class="success-box" id="successBox">
    <div class="check">&#10003;</div>
    <h2>Registration Successful!</h2>
    <p id="successMsg"></p>
    <div class="token-box" id="tokenBox">
      <strong>JWT Token (saved to localStorage)</strong>
      <span id="tokenDisplay"></span>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080';

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
    el.style.display = 'block';
  }
  function hideAlert() {
    document.getElementById('alert').style.display = 'none';
  }
  function markError(id) {
    document.getElementById(id).classList.add('error');
  }
  function clearErrors() {
    ['name','email','password','confirm'].forEach(id => {
      document.getElementById(id).classList.remove('error');
    });
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();
    clearErrors();

    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    // Client-side validation
    let valid = true;
    if (name.length < 2) {
      markError('name'); valid = false;
    }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      markError('email'); valid = false;
    }
    if (password.length < 6) {
      markError('password'); valid = false;
    }
    if (password !== confirm) {
      markError('confirm');
      showAlert('Passwords do not match.', 'failure');
      return;
    }
    if (!valid) {
      showAlert('Please fix the highlighted fields.', 'failure');
      return;
    }

    // Submit
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Registering...';

    try {
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || data.message || `Server error ${res.status}`);
      }

      // Save token
      localStorage.setItem('token', data.token);
      localStorage.setItem('userEmail', data.email);
      localStorage.setItem('userName', data.name);
      localStorage.setItem('userRole', data.role);

      // Show success
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('successMsg').textContent =
        `Welcome, ${data.name}! Your account was created as ${data.role}.`;
      document.getElementById('tokenDisplay').textContent = data.token;
      document.getElementById('successBox').style.display = 'block';

    } catch (err) {
      showAlert(err.message, 'failure');
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  });
</script>

</body>
</html>
