spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/education_db
    username: postgres
    password: basal
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: education-portal-secret-key-2024-must-be-at-least-256-bits-long
    expiration-ms: 86400000

logging:
  level:
    com.education.portal: DEBUG
    org.springframework.security: INFO
